services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: integrationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: integrationdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: "dev-secret-change-in-production-needs-256-bits"
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
